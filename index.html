<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercurio</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <!-- Collage de fondo -->
    <div class="collage-background"></div>
    <div class="overlay"></div>

    <main class="container">
        <!-- Encabezado del Disco -->
        <header class="album-header">
            <h1 class="album-title">MERCURIO</h1>
            <p class="release-year">Mercurio - 1995</p>
            <div class="group-logo">
                <img src="logo.jpg" alt="Logo">
            </div>
        </header>
      <section class="tracklist">
    <button class="track-btn" onclick="goToSong('ENAMORADISIMO', 'L1R0rbOz4-s')">1. Enamoradisimo</button>
    <button class="track-btn" onclick="goToSong('UN PUÑADO DE HUMO', '9P-RDewMUpw')">2. Un Puñado de Humo</button>
    <button class="track-btn" onclick="goToSong('BESOS QUE MATAN', 'S168pbfIKXs')">3. Besos Que Matan</button>
    <button class="track-btn" onclick="goToSong('SELLADO CON UN BESO', 'AiMtyp1CJ3o')">4. Sellado Con Un Beso</button>
    <button class="track-btn" onclick="goToSong('TRECE AÑOS', 'xexi0wOE9BQ')">5. Trece Años</button>
    <button class="track-btn" onclick="goToSong('COMO DECIRLE QUE LA QUIERO', 'TZuq0K_1QMc')">6. Como Decirle Que La Quiero</button>
    <button class="track-btn" onclick="goToSong('LA PUERTA DE LA ESCUELA', 'IhHKagq1I-o')">7. La Puerta De La Escuela</button>
    <button class="track-btn" onclick="goToSong('NIÑOS DE LA CALLE', 'zBnBiHP8494')">8. Niños De La Calle</button>
    <button class="track-btn" onclick="goToSong('CANTARÉ PARA TI', 'ja9HdQwJJkk')">9. Cantaré Para Ti</button>
    <button class="track-btn" onclick="goToSong('DONDE DA LA VUELTA EL AIRE', 'J2PgYTDhnaI')">10. Donde Da La Vuelta El Aire</button>
    <button class="track-btn" onclick="goToSong('UN PIÑADO DE HUMO (VERSION ACUSTICA)', 'qD-wcduexYA')">11. Un Puñado De Humo (Versión Acústica)</button>
</section>
    </main>
    <div id="song-detail" class="song-detail-view">
        <button class="close-btn" onclick="closeDetail()">✕ Volver</button>
        <div id="detail-content"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
